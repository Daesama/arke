    <rect x="176" y="190" width="10" height="10" fill="#00F0FF" opacity="0.4" transform="rotate(15 181 195)"/>
    <rect x="164" y="216" width="6" height="6" fill="#8B5CF6" opacity="0.3" transform="rotate(30 167 219)"/>
    <rect x="186" y="156" width="8" height="8" fill="#FF2D95" opacity="0.25" transform="rotate(-10 190 160)"/>
    <rect x="156" y="176" width="4" height="4" fill="#00F0FF" opacity="0.2"/>
    <rect x="170" y="144" width="6" height="6" fill="#8B5CF6" opacity="0.15" transform="rotate(45 173 147)"/>
  </g>

  <!-- Wing fragments - right side -->
  <g opacity="0.9">
    <polygon points="440,270 400,100 370,140" fill="#00F0FF" opacity="0.85"/>
    <polygon points="450,260 416,120 430,170" fill="#8B5CF6" opacity="0.7"/>
    <polygon points="424,250 404,144 390,180" fill="#FF2D95" opacity="0.55"/>
