    <rect x="450" y="156" width="8" height="8" fill="#FF2D95" opacity="0.25" transform="rotate(10 454 160)"/>
    <rect x="480" y="176" width="4" height="4" fill="#00F0FF" opacity="0.2"/>
    <rect x="464" y="144" width="6" height="6" fill="#8B5CF6" opacity="0.15" transform="rotate(-45 467 147)"/>
  </g>

  <!-- Central core -->
  <circle cx="320" cy="160" r="16" fill="none" stroke="#00F0FF" stroke-width="2"/>
