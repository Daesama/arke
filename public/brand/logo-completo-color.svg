  <circle cx="320" cy="160" r="24" fill="none" stroke="#8B5CF6" stroke-width="0.6" opacity="0.25"/>
  <circle cx="320" cy="160" r="32" fill="none" stroke="#FF2D95" stroke-width="0.4" opacity="0.12"/>

  <!-- ARKE text -->
  <text x="320" y="330" fill="#EEEEF0" font-family="Arial, Helvetica, sans-serif" font-size="60" font-weight="500" letter-spacing="16" text-anchor="middle">ARKE</text>
